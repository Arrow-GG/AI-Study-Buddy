databases:
  - name: ai-study-db
    plan: free
    databaseName: ai_study_assistant
    user: ai_study_user
    region: oregon

services:
  # FastAPI Backend
  - type: web
    name: ai-study-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-study-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: CORS_ORIGINS
        value: https://ai-study-frontend.onrender.com
      - key: LOG_LEVEL
        value: INFO
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_data
      - key: DATA_DIR
        value: /tmp/data
      - key: REDIS_URL
        value: ""

  # Next.js Frontend
  - type: web
    name: ai-study-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-study-backend.onrender.com/api
      - key: NEXT_PUBLIC_APP_NAME
        value: AI Study Assistant
