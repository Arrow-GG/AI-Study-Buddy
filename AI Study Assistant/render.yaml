services:
  - type: web
    name: ai-study-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: DATABASE_URL
        fromDatabase:
          name: ai-study-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: https://ai-study-frontend.onrender.com
    rootDir: backend

  - type: web
    name: ai-study-frontend
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-study-backend.onrender.com/api
    rootDir: frontend

  - type: pserv
    name: ai-study-db
    ipAllowList: []
    plan: free
    postgresVersion: 15
